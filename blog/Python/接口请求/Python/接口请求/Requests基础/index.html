                <h1 id="1-Requests库介绍"><a href="#1-Requests库介绍" class="headerlink" title="1. Requests库介绍"></a>1. Requests库介绍</h1><blockquote>
<p>Rquests 库是 Python 编写的，基于 urllib 的 HTTP 库，用于实现接口自动化测试</p>
</blockquote>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><code class="hljs python"><span class="hljs-comment"># 请求方法有get,post,put,delete等</span><br><span class="hljs-comment"># url: 待请求的url地址</span><br><span class="hljs-comment"># params：查询参数【get方法中问号后的内容】</span><br><span class="hljs-comment"># headers：请求头【通常不指定也没关系】</span><br><span class="hljs-comment"># data：表单格式的请求体</span><br><span class="hljs-comment"># json：json格式的 请求体</span><br><span class="hljs-comment"># cookies：cookie数据</span><br><span class="hljs-comment"># resp：响应结果</span><br>resp = requests.请求方法(url=<span class="hljs-string">&#x27;URL地址&#x27;</span>, params=&#123;k:v&#125;, headers=&#123;k:v&#125;,<br>                     data=&#123;k:v&#125;, json=&#123;k:v&#125;, cookies=<span class="hljs-string">&#x27;cookie数据&#x27;</span>(如：令牌))<br></code></pre></td></tr></table></figure>

<p><strong>案例：完成商城验证码错误登录</strong></p>
<img src="https://z-cloud-pic-1313046262.cos.ap-guangzhou.myqcloud.com/img/202401221421790.png" srcset="/img/loading.gif" lazyload alt="image-20240122142108594" style="zoom:80%;" />

<img src="https://z-cloud-pic-1313046262.cos.ap-guangzhou.myqcloud.com/img/202401221419974.png" srcset="/img/loading.gif" lazyload alt="image-20240122141958956" style="zoom:80%;" />

<img src="https://z-cloud-pic-1313046262.cos.ap-guangzhou.myqcloud.com/img/202401221418702.png" srcset="/img/loading.gif" lazyload alt="image-20240122141842602" style="zoom:80%;" />

<img src="https://z-cloud-pic-1313046262.cos.ap-guangzhou.myqcloud.com/img/202401221420628.png" srcset="/img/loading.gif" lazyload alt="image-20240122142050617" style="zoom:80%;" />

<p>使用requests实现同点击登录按钮后一样的效果</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><code class="hljs python"><span class="hljs-keyword">import</span> requests<br><span class="hljs-comment"># 部署在本地虚拟机上的TpShop项目的登录界面</span><br>resp = requests.post(<br>    url=<span class="hljs-string">&#x27;http://192.168.88.130/index.php?m=Home&amp;c=User&amp;a=do_login&amp;t=0.4931994393421102&#x27;</span>,<br>    headers=&#123;<span class="hljs-string">&#x27;Content-Type&#x27;</span>:<span class="hljs-string">&#x27;application/x-www-form-urlencoded; charset=UTF-8&#x27;</span>&#125;,<br>    data=&#123;<span class="hljs-string">&#x27;username&#x27;</span>:<span class="hljs-string">&#x27;13800138006&#x27;</span>,<span class="hljs-string">&#x27;password&#x27;</span>:<span class="hljs-string">&#x27;123456&#x27;</span>,<span class="hljs-string">&#x27;verify_code&#x27;</span>:<span class="hljs-string">&#x27;1234&#x27;</span>&#125;<br>    )<br><span class="hljs-comment"># 获取响应结果的json格式</span><br><span class="hljs-built_in">print</span>(resp.json())<br></code></pre></td></tr></table></figure>

<img src="https://z-cloud-pic-1313046262.cos.ap-guangzhou.myqcloud.com/img/202401221424741.png" srcset="/img/loading.gif" lazyload alt="image-20240122142422706" style="zoom:80%;" />

<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><code class="hljs python"><span class="hljs-comment"># 常用响应结果数据</span><br>resp.url<br>resp.status_code<br>resp.cookies<br>resp.headers<br>resp.text<br><span class="hljs-comment"># 得到的是dict对象</span><br>resp.json()<br></code></pre></td></tr></table></figure>
